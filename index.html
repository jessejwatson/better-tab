<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>New Tab Page</title>
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <div class="page-center">
        <div id="clock" class="clock" hidden></div>
        <div class="container">
            <div id="search-wrapper" class="search-wrapper">
                <span id="active-powerup" class="powerup-chip" hidden></span>
                <input
                    type="text"
                    id="search"
                    placeholder="Search or enter URL"
                    autofocus
                />
                <kbd class="search-hint">⌃S</kbd>
            </div>
            <div id="notes-panel" class="notes-panel">
                <div class="notes-header">
                    <span class="notes-label">Notes <kbd class="notes-shortcut">⌃N</kbd></span>
                    <div class="notes-header-actions">
                        <button id="notes-copy-btn" class="notes-action-btn" title="Copy as markdown">Copy</button>
                        <button id="notes-download-btn" class="notes-action-btn" title="Download as notes.md">Download</button>
                        <button id="notes-clear-btn" class="notes-action-btn notes-action-btn--danger" title="Clear all notes">Clear</button>
                    </div>
                </div>
                <div id="notes-preview" class="notes-preview"></div>
                <textarea id="notes-textarea" class="notes-textarea" placeholder="Start writing in Markdown…" hidden></textarea>
            </div>
        </div>
        </div>
        <ul id="suggestions" class="suggestions"></ul>
        <div class="dev-buttons">
            <button id="notes-toggle" class="dev-btn" title="Toggle notes (⌃⇧N) · Focus/open notes (⌃N)">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                    <line x1="16" y1="13" x2="8" y2="13"/>
                    <line x1="16" y1="17" x2="8" y2="17"/>
                </svg>
                Notes
                <kbd class="dev-btn-shortcut">⌃⇧N</kbd>
            </button>
            <button id="configure-btn" class="dev-btn" title="Copies command to clipboard — paste in terminal to edit">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
                </svg>
                Edit config
            </button>
            <button id="reload-btn" class="dev-btn" title="Open Extensions page to reload">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
                </svg>
                Reload extension
            </button>
        </div>
        <script src="config.js"></script>
        <script src="script.js"></script>
        <script src="notes.js"></script>
    </body>
</html>
